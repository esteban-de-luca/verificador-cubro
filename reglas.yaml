# =============================================================================
# reglas.yaml — Fuente de verdad de todas las reglas de negocio
# Verificador de Ficheros de Corte · CUBRO Design SL
# Arquitectura v3.0 · Abril 2026
#
# TABLA DE ROUTING DE CAMBIOS:
#   Categoría A (valor): editar aquí, sin tocar Python
#   Categoría B (nuevo check): YAML + nueva función + engine.py + tests
#   Categoría C (lógica): solo Python + tests antes y después
# =============================================================================

# -----------------------------------------------------------------------------
# MATERIALES (Check C-15)
# Regla crítica: PLY → solo LAM o LIN · MDF → solo LAC o WOO
# -----------------------------------------------------------------------------
materiales:
  PLY:
    gamas_validas: [LAM, LIN]
    espesores_mm:
      LAM: 19
      LIN: 20
  MDF:
    gamas_validas: [LAC, WOO]
    espesores_mm:
      LAC: 18
      WOO: 19

# -----------------------------------------------------------------------------
