# =============================================================================
# reglas.yaml — Fuente de verdad de todas las reglas de negocio
# Verificador de Ficheros de Corte · CUBRO Design SL
# Arquitectura v3.0 · Abril 2026
#
# TABLA DE ROUTING DE CAMBIOS:
#   Categoría A (valor): editar aquí, sin tocar Python
#   Categoría B (nuevo check): YAML + nueva función + engine.py + tests
#   Categoría C (lógica): solo Python + tests antes y después
# =============================================================================

# -----------------------------------------------------------------------------
# MATERIALES (Check C-15)
# Regla crítica: PLY → solo LAM o LIN · MDF → solo LAC o WOO
# -----------------------------------------------------------------------------
materiales:
  PLY:
    gamas_validas: [LAM, LIN]
    espesores_mm:
      LAM: 19
      LIN: 20
  MDF:
    gamas_validas: [LAC, WOO]
    espesores_mm:
      LAC: 18
      WOO: 19

# -----------------------------------------------------------------------------
# ACABADOS (Check C-16)
# Para añadir un nuevo acabado: añadir una línea aquí — 2 minutos, cero Python
# -----------------------------------------------------------------------------
acabados:
  LAC:
    - Zafiro
    - Negro
    - Ave
    - Curry
    - Roto
    - Marga
    - Celeste
    - Humo
    - Blanco
    - Argil
    - Crema
    - Seda
    - Noche
    - Tinta
    - Pino
  WOO:
    - Roble
    - Cerezo
    - Nogal
  LAM:
    - Blanco
    - Pale
    - Rosa
    - Cadaques
    - Caraibi
    - Sable
    - Agave
    - Sahara
    - Graphite
    - Fes
    - Noir
    - Brick
    - Perle
    - Blush
    - Comodoro
    - Marble Green
    - Metal
  LIN:
    - Mushroom
    - Smokey Blue
    - Conifer
    - Pistachio
    - Olive
    - Pewter
    - Vapour

# -----------------------------------------------------------------------------
# CAZOLETAS METOD (Check C-25)
# Número de bisagras según altura de puerta (en mm)
# -----------------------------------------------------------------------------
cazoletas_metod:
  - {alto_max: 800,  cazoletas: 2,    nota: "2 bisagras"}
  - {alto_max: 899,  cazoletas: null, nota: "Zona límite — 2 o 3"}
  - {alto_max: 1799, cazoletas: 3,    nota: "3 bisagras"}
  - {alto_max: 2199, cazoletas: 4,    nota: "4 bisagras"}
  - {alto_max: 99999, cazoletas: 5,   nota: "5 bisagras"}

