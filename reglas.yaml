# -----------------------------------------------------------------------------
# LAYERS DXF (Checks C-30 a C-43)
# -----------------------------------------------------------------------------
layers:
  # C-30: estos layers NO deben aparecer en ningún DXF.
  # CONTROL es un artefacto interno de Rhino que indica fallo en la exportación.
  prohibidos_control:
    - CONTROL

  # C-31: este layer NO debe tener geometría operativa
  sin_geometria_operativa:
    - "0"

  # C-32: layers internos de Rhino que NO deben aparecer en DXFs exportados
  rhino_internos:
    - HORNACINAS
    - FAKTUM
    - GODMORGON
    - METOD
    - PAX

  # C-33: obligatorio en todos los DXFs
  obligatorios:
    - 0_ANOTACIONES

  # C-34: obligatorio en tableros de gama LAM y LIN
  obligatorios_lam_lin:
    - 13-BISELAR-EM5-Z0_8

  # C-43: layers en desuso — advertencia si aparecen
  desuso:
    - 7-POCKET-EM5-Z14_CANGREJO
    - 8B_REBAJE_PARA_TIRADOR_Z2
    - B_CABINEO1_D5_Z12
    - B_CABINEO2_D15_Z11
    - B_CORREDERA_D5_Z12
    - B_COLGADOR_D8_Z15
    - B_CAJON_D10_Z12

  # C-35: layer de corte perimetral según gama y acabado
  corte_perimetral:
    estandar: "10_12-CUTEXT-EM5-Z18"
    rodapie: "10_12-CORTAR_RODAPIE"
    laca_no_estandar: "10_12-CONTORNO LACA"
    # Acabados LAC que usan el layer estándar CUTEXT (no CONTORNO LACA)
    lac_acabados_estandar:
      - Roto
      - Crema
      - Blanco
      - Seda

  # C-37: recuento de tiradores HANDCUT
  tirador_handcut: "9_11-HANDCUT-EM5-Z18"

  # C-40: ventilación (rodapiés RV)
  ventilacion: "8-REJILLA"

  # C-41: colgador de hornacina
  colgador_hornacina: "MECANISMO_HORNACINA_Z12"

  # C-42: tensores
  tensores:
    - TIRANTE-POCKET-EM5-Z12
    - TIRANTE-DES3_IN-EM5-Z9

  # C-38: layers de taladros para cajones (torn.)
  cajones_drill:
    - 3-DRILL-EM5-Z12
    - 3-DRILL-EM3-Z12
    - 3-DRILL-EM5-Z2
    - 3A-DRILL-EM3-Z3
    - 3A-DRILL-EM5-Z12_4
    - 3B-DRILL-EM5-Z14

  # C-39: layers de cazoletas (bisagras METOD y PAX)
  bisagras_metod:
    - 6-POCKET-EM5-Z14
    - 7-POCKET-EM5-Z14
  bisagras_pax:
    - 6A-POCKET-EM5-Z14_PAX
    - 7-POCKET-EM5-Z14

# -----------------------------------------------------------------------------
# DISTANCIA BISAGRAS (Check C-44)
# - METOD: distancia entre cazoletas múltiplo exacto de 50 mm.
# - PAX puerta normal (pieza ≥ 700 mm): múltiplo exacto de 32 mm.
# - PAX altillo (pieza < 700 mm): cazoleta a 68 mm exactos del borde.
# - Pieza con 1 sola cazoleta: FAIL (toda puerta lleva ≥ 2 bisagras).
# Tolerancia: cero en todos los casos.
# -----------------------------------------------------------------------------
bisagra_distancia:
  layer_7pocket: "7-POCKET-EM5-Z14"        # agujero principal (común METOD y PAX)
  layer_6pocket_metod: "6-POCKET-EM5-Z14"  # companion METOD → paso 50 mm
  layer_6pocket_pax: "6A-POCKET-EM5-Z14_PAX"  # companion PAX → paso 32 mm
  paso_metod: 50
  paso_pax: 32
  # Layers que delimitan el contorno de cada pieza individual en el nesting.
  # Necesarias para asociar cada cazoleta a su pieza (point-in-bbox).
  layers_contorno_pieza:
    - "10_12-CUTEXT-EM5-Z18"   # estándar (PLY/MDF)
    - "10_12-CONTORNO LACA"    # MDF LAC con acabados no estándar (Agave, etc.)
  # Régimen especial para altillos PAX: piezas con dimensión menor en el eje
  # de las bisagras < umbral_mm → la cazoleta debe estar a borde_mm exactos
  # del borde de la pieza (no aplica el múltiplo de 32 entre cazoletas).
  pax_altillo:
    umbral_mm: 700      # pieza < 700 mm en el eje de las bisagras → altillo
    borde_mm: 68        # cada cazoleta a 68 mm exactos del borde más cercano
  # Excepciones: configuraciones de puerta con herrajes custom validadas
  # manualmente por diseño. Cada entrada describe (ancho, alto, n_cazoletas).
  # Si una pieza encaja, C-44 no la valida (otras reglas siguen aplicándose).
  # Tolerancia ±2 mm en dimensiones para absorber ruido FP del DXF.
  configuraciones_especiales:
    - dim: [798, 256]
      n_cazoletas: 4
      descripcion: "Puerta custom con 4 bisagras (2x2) — herrajes especiales"

# -----------------------------------------------------------------------------
# TIPOS DE GEOMETRÍA PROHIBIDOS (Check C-46)
# Rhino debe exportar curvas como POLYLINE / LWPOLYLINE / LINE / ARC / CIRCLE.
# Las SPLINEs son curvas paramétricas que el postprocesador CNC no interpreta
# de forma fiable y, cuando aparecen en 0_ANOTACIONES, indican que el texto se
# explotó a curvas — rompe los checks que dependen de leer los IDs de pieza.
# -----------------------------------------------------------------------------
tipos_geometria:
  prohibidos:
    - SPLINE

# -----------------------------------------------------------------------------
# NESTING LACA (Check C-45)
# Disposición geométrica de las piezas LAC en el nesting:
# - Si el proyecto contiene CUALQUIER acabado LAC no estándar (Marga, Agave,
#   Noche, etc.) → TODAS las piezas LAC del proyecto (incluidos Roto/Crema/
#   Blanco/Seda) deben ir PEGADAS (gap = 0).
# - Si todos los acabados LAC del proyecto son estándar (Roto/Crema/Blanco/
#   Seda) → todas las piezas deben ir SEPARADAS exactamente 15 mm.
# La lista de acabados estándar se reutiliza de
# layers.corte_perimetral.lac_acabados_estandar.
# -----------------------------------------------------------------------------
nesting_laca:
  # Layer del que se leen los contornos para validar la disposición.
  # En proyectos no estándar, C-35 garantiza que todas las piezas LAC usan
  # este layer; en proyectos 100% estándar, las piezas LAC siguen quedando
  # rodeadas por CUTEXT — el check probará primero CONTORNO LACA y, si está
  # vacío, caerá a CUTEXT.
  layer_contorno_no_estandar: "10_12-CONTORNO LACA"
  layer_contorno_estandar: "10_12-CUTEXT-EM5-Z18"
  # Distancia esperada entre piezas vecinas según el régimen del proyecto.
  gap_pegado_mm: 0
  gap_separado_mm: 15
  # Tolerancia para absorber ruido de coma flotante en coordenadas DXF.
  eps_mm: 0.5
  # Solape mínimo (fracción 0..1) en el eje perpendicular para considerar
  # dos piezas como "vecinas" en el otro eje. Evita comparar piezas de
  # filas/columnas distintas.
  solape_vecindad: 0.5

# -----------------------------------------------------------------------------
# DESBASTE TIRADOR (Check C-36)
# Mapping color tirador → layer DXF esperado
# La clave _LIN aplica a cualquier pieza de gama LIN independientemente del color
# La clave _DEFAULT aplica si no hay coincidencia específica
# -----------------------------------------------------------------------------
desbaste_tirador:
  CEREZO:  "4-DES1_IN-EM5-Z3_7_CEREZO"
  ROBLE:   "4-DES1_IN-EM5-Z3_7_ROBLE"
  NOGAL:   "4-DES1_IN-EM5-Z3_7_NOGAL"
  FRESNO:  "4-DES1_IN-EM5-Z3_7_FRESNO"
  ABEDUL:  "4-DES1_IN-EM5-Z4_ABEDUL"
  INOX:    "4-DES1_IN-EM5-Z1_3_METALIC"
  METAL:   "4-DES1_IN-EM5-Z1_3_METALIC"
  LATON:   "4-DES1_IN-EM5-Z1_8_LATON"
  _LIN:    "4-DES1_IN-EM5-Z3_1_SOFT"
  _DEFAULT: "4-DES1_IN-EM5-Z2_1_HPL_HPL"

# Modelos de tirador que generan geometría en el DXF (los demás solo cuentan)
tiradores_con_geometria_dxf:
  - Round
  - Square
  - Pill

# -----------------------------------------------------------------------------
# TIPOLOGÍAS (Checks C-17, C-20–C-22, C-27, C-28)
# -----------------------------------------------------------------------------
tipologias:
  # C-17: sufijo del ID de pieza → tipología esperada
  sufijo_a_tipologia:
    P: [P, X, L]   # M2-P1, M2-X1, M4-PL1
    C: [C]          # M2-C1
    T: [T, TBE]     # M1-T1, M1-TBE1

  # C-20: tipologías que SIEMPRE deben tener apertura I/D
  # (P está aquí; X se valida en C-21 con su propio check específico)
  apertura_obligatoria:
    - P

  # OBSOLETO: antes X solo requería apertura si tenía tirador. Ahora todas
  # las X requieren apertura (validado por C-21 directamente). Se mantiene
  # la clave vacía para no romper el schema validator.
  apertura_si_tirador: []

  # C-22: tipologías que NUNCA deben tener apertura I/D
  apertura_nunca:
    - C

  # C-20 (excepción): piezas P con torn. que SÍ requieren apertura I/D.
  # Caso típico: frentes compuestos donde una P+torn. se atornilla sobre
  # otra P+cazta. del mismo mueble y abre junto a ella. La apertura I/D
  # describe el sentido de giro compartido con la hermana.
  # Match exacto sobre (ancho, alto) en ambas orientaciones.
  apertura_obligatoria_p_torn:
    - dim: [254, 798]
      descripcion: "Frente compuesto — puerta secundaria atornillada"

  # C-28: tipologías que NO deben llevar tirador (alerta si lo tienen)
  tipologias_sin_mecanizado:
    - T
    - TBE
    - L
    - B
    - E
    - R
    - CT
    - FE   # Frente de encimera (sin mecanizado, como E o L)

  # C-27: mecanizado esperado por tipología
  # Si la tipología no aparece aquí, no se espera mecanizado
  mecanizado_esperado:
    P: "cazta."
    X: "cazta."
    C: "torn."
    RV: "vent."
    H: "hor."

# -----------------------------------------------------------------------------
# LOGÍSTICA (Checks C-54, C-55)
# -----------------------------------------------------------------------------
logistica:
  # C-54: desviación máxima permitida entre suma EAN y peso OT/albarán
  tolerancia_peso_porcentaje: 2.0

  # C-55: umbral de dimensión máxima para envío en estructura (mm)
  estructura_umbral_mm: 2480

  # Longitud máxima para paquetería sin estructura (mm)
  estructura_pequena_max_mm: 1200

  # Peso máximo para paquetería estándar (kg)
  paqueteria_peso_max_kg: 25

# -----------------------------------------------------------------------------
# NOMENCLATURA (Checks C-00, C-02)
# Patrones glob para identificar tipo de archivo por nombre
# prefijos_estado: valores usados al renombrar carpetas en Drive
# -----------------------------------------------------------------------------
nomenclatura:
  patrones:
    despiece:   "DESPIECE_*"
    etiquetas:  "ETIQUETAS_*"
    ean:        "EAN LOGISTIC_*"
    ean_alt:    "EAN_LOGISTIC_*"
    ot:         "OT_*"
    dxf_tablero: "*_T[0-9]*.dxf"
    dxf_todos:  "*TODOS LOS TABLEROS.dxf"
    albaran:    "ALBARAN_*"
    albaran_alt: "ALBARÁN_*"
    nesting_pdf_ply: "*PLY*.pdf"
    nesting_pdf_mdf: "*MDF*.pdf"
    bultos:     "BULTOS_*"
    destino_caja: "DESTINO CAJA_*"
    # Dossiers, planos y alzados — patrones flexibles que cubren cualquier
    # variante de prefijo, idioma o redacción (CUBRO_, sin prefijo, ES/EN/FR,
    # "técnico_de_proyecto" / "Technical_Project_Dossier" / etc.).
    dossier:    "*DOSSIER*"
    technical_project: "*TECHNICAL_PROJECT*"
    planos:     "*PLANO*"
    alzados:    "*ALZADO*"
    extraccion: "EXTRACCION_*"
    informe:    "informe_*"
    packing_list_cliente: "PACKING LIST CLIENTE_*"
  prefijos_estado:
    bloqueado:        "[BLOQUEADO] "
    advertencias:     "[ADVERTENCIAS] "
    aprobado:         "[OK] "
    aprobado_manual:  "[OK - MANUAL] "

# -----------------------------------------------------------------------------
# EXTRACCION (Checks C-70 a C-80)
# Documento CSV con cabecera del proyecto + tabla de piezas, generado por el
# sistema interno de CUBRO. Sirve como tercer testigo independiente de OT y
# DESPIECE: si discrepa con cualquiera de ellos, bloqueamos producción.
# -----------------------------------------------------------------------------
extraccion:
  # Ruta al CSV de mapeo Gama+Acabado → código <COD>_tab (relativa al repo).
  # Solo aplica al documento EXTRACCION: la gama "Laminado" se codifica como
  # HPL (no LAM como en el resto del sistema) y "Wood" lleva sufijo "_M_".
  naming_csv: "core/naming_extraccion.csv"

  # C-73: tolerancia absoluta (en metros) para "Metros de canto" (EXTRACCION)
  # vs "Mts lineales de corte" (OT). Cubre el redondeo al entero superior que
  # hace el sistema por material en proyectos multi-material; ±4 mt absorbe
  # ese acumulado sin tapar discrepancias reales.
  tolerancia_metros_canto_mt: 4.0

  # Alias de claves de cabecera del CSV (Sección A). Mapea la clave tal cual
  # aparece en el archivo (case-insensitive, sin tildes) → nombre canónico
  # interno. Absorbe typos del sistema y variantes históricas.
  alias_cabecera:
    "numero ot":                       numero_ot
    "semana":                          semana
    "fecha entrada":                   fecha_entrada
    "fecha salida":                    fecha_salida
    "altillos":                        altillos_seccion
    "mueble de nevera 75x60x220 cm":   mueble_nevera
    "baldas con 2 herrajes ocultos":   baldas_2h
    "baldas con 3 herrajes ocultos":   baldas_3h
    "hornacinas":                      hornacinas
    "caja grande":                     caja_grande
    "caja pequena":                    caja_pequena       # "pequeña" sin tilde tras normalización
    "estructura grande":               estructura_grande
    "estructura pequena":              estructura_pequena
    "cantidad de palets":              palets
    "cantidad de piezas":              piezas
    "metros de canto":                 metros_canto
    "cantidad de tensores":            tensores
    "rejillas ventilacion":            rejillas_ventilacion
    "tiradores integrados":            tiradores          # nombre oficial
    "tiradores integradros":           tiradores          # legacy typo — deprecar tras migración
    "prioridad de inc":                prioridad_inc

  # C-72: tipos de envío en cabecera (EXTRACCION) ↔ "Modelo de envío" (OT).
  # Mapea la clave canónica de la cabecera → texto exacto del OT.
  tipos_envio:
    caja_grande:         "Caja grande"
    caja_pequena:        "Caja pequeña"
    estructura_grande:   "Estructura grande"
    estructura_pequena:  "Estructura pequeña"

  # C-75: valores válidos en "Prioridad de INC". Solo se rellena si el proyecto
  # es -INC; vacío en no-INC es válido.
  prioridades_inc_validas:
    - P1
    - P2

  # C-80: dimensiones esperadas de balda según número de herrajes ocultos.
  # Orientación libre (200×600 ≡ 600×200). Cualquier balda B del DESPIECE con
  # estas dimensiones cuenta para el campo correspondiente del EXTRACCION.
  baldas_2h_dims:
    - {ancho: 200, alto: 600}
    - {ancho: 200, alto: 800}
  baldas_3h_dims:
    - {ancho: 200, alto: 1200}
